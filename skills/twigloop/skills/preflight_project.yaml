name: preflight_project
purpose: >
  Validate a project draft before publishing. Checks required fields,
  schema compliance, and returns missing fields and warnings.
required_inputs:
  - access_token
  - draft_id
optional_inputs: []
mcp_tools_used:
  - get_draft
  - preflight_project
  - get_publish_rules
  - get_project_schema
output_shape:
  status: string  # "passed" | "failed"
  missing_fields: list[string]
  warnings: list[string]
  checked_fields_count: integer

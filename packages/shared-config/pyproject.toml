[project]
name = "shared-config"
version = "0.1.0"
description = "Shared configuration via pydantic-settings"
requires-python = ">=3.12"
dependencies = [
    "pydantic-settings>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_config"]

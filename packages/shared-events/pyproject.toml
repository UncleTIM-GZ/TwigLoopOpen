[project]
name = "shared-events"
version = "0.1.0"
description = "NATS event definitions and payload schemas"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "nats-py>=2.9",
    "shared-config",
]

[tool.uv.sources]
shared-config = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_events"]

[project]
name = "shared-auth"
version = "0.1.0"
description = "Shared JWT and RBAC utilities"
requires-python = ">=3.12"
dependencies = [
    "pyjwt[crypto]>=2.9",
    "pydantic>=2.9",
    "bcrypt>=4.2",
    "fastapi>=0.115",
    "shared-config",
]

[tool.uv.sources]
shared-config = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_auth"]

# =====================================================
# LOCAL DEVELOPMENT ONLY
# All credentials below are default development values.
# Production deployments MUST use secure credentials
# provided via environment variables or .env files.
# =====================================================

name: twigloop

services:
  # ===== PostgreSQL 16 =====
  postgres:
    image: postgres:16-alpine
    container_name: twigloop-postgres
    environment:
      POSTGRES_USER: twigloop
      POSTGRES_PASSWORD: twigloop
      POSTGRES_DB: twigloop
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twigloop"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - twigloop-net

  # ===== Redis 7 =====
  redis:
    image: redis:7-alpine
    container_name: twigloop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - twigloop-net

  # ===== NATS 2.10 (JetStream) =====
  nats:
    image: nats:2.10-alpine
    container_name: twigloop-nats
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - twigloop-net

  # ===== Temporal =====
  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: twigloop-temporal
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: twigloop
      POSTGRES_PWD: twigloop
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker.yaml
    ports:
      - "7233:7233"
    volumes:
      - ./infra/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - twigloop-net

  temporal-ui:
    image: temporalio/ui:2.32.0
    container_name: twigloop-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8233
    ports:
      - "8233:8080"
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - twigloop-net

  # ===== ClickHouse =====
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: twigloop-clickhouse
    environment:
      CLICKHOUSE_DB: twigloop_analytics
      CLICKHOUSE_USER: twigloop
      CLICKHOUSE_PASSWORD: twigloop
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./scripts/init-clickhouse.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - twigloop-net

  # ===== MinIO (S3) =====
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: twigloop-minio
    command: server /data --console-address ":9011"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9010:9000"
      - "9011:9011"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - twigloop-net

  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    container_name: twigloop-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/twigloop;
      mc mb --ignore-existing local/twigloop-exports;
      echo 'MinIO buckets initialized';
      "
    networks:
      - twigloop-net

volumes:
  postgres-data:
  redis-data:
  nats-data:
  clickhouse-data:
  minio-data:

networks:
  twigloop-net:
    driver: bridge
